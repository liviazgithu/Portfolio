<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>Portfolio | Livia Zucca</title>
  <meta name="description" content="Portfolio de Livia Zucca - création numérique, design et audiovisuel">

  <!-- PERF -->
  <link rel="preload" as="image" href="img/moi.webp">

  <!-- CSS -->
  <link rel="preload" href="style.css" as="style" onload="this.rel='stylesheet'">

  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- ICONS -->
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style" onload="this.rel='stylesheet'">

</head>

<body>

<!-- HERO -->
<div class="hero">

  <!-- IMAGE LCP OPTIMISÉE -->
  <img src="img/moi.webp" alt="Photo de Livia Zucca" class="hero-img" fetchpriority="high">

  <div class="hero-top">
    <div class="logo">LZ</div>

    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="burger">
      <span></span>
      <span></span>
      <span></span>
    </label>

    <nav class="nav menu">
      <a href="#projects">Projets</a>
      <a href="#about">À propos</a>
      <a href="#contact">Contact</a>
    </nav>
  </div>

  <div class="hero-center">
    <h1>LIVIA ZUCCA</h1>
    <p>Création numérique, Photographie</p>

    <div class="buttons">
      <a href="#contact" class="btn">Me contacter</a>
      <a href="#projects" class="btn">Voir mes projets</a>
    </div>
  </div>

</div>

<main class="portfolio-content">

<!-- ABOUT -->
<section class="about" id="about">
  <div class="about-card">
    <h2>À propos de moi</h2>
    <p>Étudiante en BUT MMI, je développe des compétences en web, design et audiovisuel.</p>
  </div>
</section>

<!-- SKILLS -->
<section class="skills">
  <h2>Mes compétences</h2>

  <div class="skills-container">

    <div class="skill-card">
      <img src="icons/html.webp" alt="HTML" width="55" height="55" loading="lazy">
      <h3>Web</h3>
      <p>HTML, CSS</p>
    </div>

    <div class="skill-card">
      <img src="icons/illustrator.webp" alt="Illustrator" width="55" height="55" loading="lazy">
      <h3>Design</h3>
      <p>Photoshop, Canva</p>
    </div>

  </div>
</section>

<!-- PROJECTS -->
<section class="projects" id="projects">
  <h2>Mes projets</h2>

  <div class="projects-container">

    <a href="#" class="project-card">
      <img src="img/projet-interview.webp" alt="Projet interview" width="400" height="260" loading="lazy">
    </a>

    <a href="#" class="project-card">
      <img src="img/projet-corsica.webp" alt="Projet Corsica" width="400" height="260" loading="lazy">
    </a>

  </div>
</section>

<!-- CONTACT -->
<section class="contact" id="contact">
  <h2>Contact</h2>

  <form class="contact-form">
    <input type="text" placeholder="Nom">
    <input type="email" placeholder="Email">
    <textarea placeholder="Message"></textarea>
    <button type="submit">Envoyer</button>
  </form>

</section>

</main>

</body>
</html>
